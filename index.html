<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | AgroPath</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2ecc71;
            --glass-bg: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            color: white;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 5px;
            background: linear-gradient(to right, #ffffff, #a8e063);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; opacity: 0.8; }

        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group.hidden { display: none; }

        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 6px; margin-left: 5px; font-weight: 500; }
        
        .form-group input {
            width: 100%; padding: 12px 16px; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px;
            color: white; font-size: 0.95rem; outline: none; transition: 0.3s;
        }

        .form-group input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .form-group input:focus { background: rgba(255, 255, 255, 0.2); border-color: var(--primary-green); }

        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px;
        }

        .main-btn { background: var(--primary-green); color: white; box-shadow: 0 8px 15px rgba(46, 204, 113, 0.3); }
        .main-btn:hover { background: #27ae60; transform: translateY(-2px); box-shadow: 0 12px 20px rgba(46, 204, 113, 0.4); }

        .google-btn { background: white; color: #333; }
        .google-btn:hover { background: #f1f1f1; transform: translateY(-2px); }

        .divider { margin: 20px 0; display: flex; align-items: center; font-size: 0.85rem; color: rgba(255,255,255,0.7); }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.3); }
        .divider::before { margin-right: 10px; } .divider::after { margin-left: 10px; }

        .footer-text { margin-top: 25px; font-size: 0.85rem; }
        .footer-text span { transition: 0.3s; }

        #errorMsg { color: #ff6b6b; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="brand-logo">AgroPath</div>
        <div class="tagline" id="formSubtitle">Sign in to your account</div>

        <form id="authForm">
            <div class="form-group hidden" id="nameGroup">
                <label>FULL NAME</label>
                <input type="text" id="fullName" placeholder="John Doe">
            </div>
            
            <div class="form-group">
                <label>EMAIL ADDRESS</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>

            <div class="form-group hidden" id="confirmPasswordGroup">
                <label>CONFIRM PASSWORD</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" minlength="6">
            </div>

            <p id="errorMsg"></p>
            <button type="submit" class="btn main-btn" id="submitBtn">Sign In</button>
        </form>

        <div class="divider">OR</div>

        <button class="btn google-btn" id="googleBtn" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
            </svg>
            Continue with Google
        </button>

        <div class="footer-text">
            <p id="toggleText">
                <span id="prefixText">Don't have an account?</span> 
                <span id="toggleLink" style="color:#2ecc71;font-weight:600;cursor:pointer;">Register Now</span>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // IMPORTANT: REPLACE THIS OBJECT WITH YOUR ACTUAL FIREBASE KEYS
       const firebaseConfig = {
  apiKey: "AIzaSyDyZ5c3whwanxBvmrPtPIGpjw5t2s2LHXc",
  authDomain: "agropath-6d8ea.firebaseapp.com",
  projectId: "agropath-6d8ea",
  storageBucket: "agropath-6d8ea.firebasestorage.app",
  messagingSenderId: "234293564294",
  appId: "1:234293564294:web:ac33138d93ca565d9dd207",
  measurementId: "G-TRKFSVR8WD"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // 1. OBSERVER: Redirect immediately if they are already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "dashboard.html";
            }
        });

        // 2. TOGGLE LOGIC: Switch between Login and Register views
        const authForm = document.getElementById('authForm');
        let isLoginMode = true;

        document.getElementById('toggleLink').addEventListener('click', () => {
            isLoginMode = !isLoginMode; // Flip the mode
            document.getElementById('errorMsg').style.display = "none";
            authForm.reset(); // Clear the inputs

            const nameGroup = document.getElementById('nameGroup');
            const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');
            const prefixText = document.getElementById('prefixText');
            const toggleLink = document.getElementById('toggleLink');
            const fullName = document.getElementById('fullName');
            const confirmPassword = document.getElementById('confirmPassword');
            const formSubtitle = document.getElementById('formSubtitle');
            const submitBtn = document.getElementById('submitBtn');
            
            if (isLoginMode) {
                // Switch back to Login view
                nameGroup.classList.add('hidden');
                confirmPasswordGroup.classList.add('hidden');
                fullName.required = false;
                confirmPassword.required = false;
                
                formSubtitle.innerText = "Sign in to your account";
                submitBtn.innerText = "Sign In";
                prefixText.innerText = "Don't have an account? ";
                toggleLink.innerText = "Register Now";
            } else {
                // Switch to Register view
                nameGroup.classList.remove('hidden');
                confirmPasswordGroup.classList.remove('hidden');
                fullName.required = true;
                confirmPassword.required = true;
                
                formSubtitle.innerText = "Join Our Community";
                submitBtn.innerText = "Create Account";
                prefixText.innerText = "Already have an account? ";
                toggleLink.innerText = "Sign In";
            }
        });

        // 3. FORM SUBMIT LOGIC: Handle Email/Password Authentication
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('submitBtn');

            errorMsg.style.display = "none";
            btn.innerText = "Processing...";

            if (isLoginMode) {
                // Login Request
                signInWithEmailAndPassword(auth, email, password)
                    .then(() => { window.location.href = "dashboard.html"; })
                    .catch((error) => { 
                        errorMsg.innerText = error.message; 
                        errorMsg.style.display = "block"; 
                        btn.innerText = "Sign In"; 
                    });
            } else {
                // Register Request
                const fullName = document.getElementById('fullName').value;
                if (password !== document.getElementById('confirmPassword').value) {
                    errorMsg.innerText = "Passwords do not match!"; 
                    errorMsg.style.display = "block"; 
                    btn.innerText = "Create Account"; 
                    return;
                }
                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => updateProfile(userCredential.user, { displayName: fullName }))
                    .then(() => { window.location.href = "dashboard.html"; })
                    .catch((error) => { 
                        errorMsg.innerText = error.message; 
                        errorMsg.style.display = "block"; 
                        btn.innerText = "Create Account"; 
                    });
            }
        });

        // 4. GOOGLE AUTH LOGIC
        document.getElementById('googleBtn').addEventListener('click', () => {
            signInWithPopup(auth, googleProvider)
                .then(() => { window.location.href = "dashboard.html"; })
                .catch((error) => { 
                    const errorMsg = document.getElementById('errorMsg');
                    errorMsg.innerText = "Google Error: " + error.message; 
                    errorMsg.style.display = "block"; 
                });
        });
    </script>
</body>
</html>
