<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | AgroPath</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; transition: 0.2s; color: #64748b; font-weight: 500; text-decoration: none; }
        .nav-item:hover { background: #f1f5f9; color: #0f172a; }
        .nav-item.active { background: #f0fdf4; color: #15803d; font-weight: 600; box-shadow: inset 0 0 0 1px rgba(22, 163, 74, 0.1); }
    </style>
</head>
<body class="text-slate-900 h-screen flex overflow-hidden">
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-slate-100 flex items-center gap-3">
            <div class="bg-green-600 p-2 rounded-xl"><i data-lucide="leaf" class="w-5 h-5 text-white"></i></div>
            <div><h1 class="text-lg font-bold tracking-tight">AGROPATH</h1></div>
        </div>
        <nav class="p-4 space-y-1.5 flex-1 overflow-y-auto">
            <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard" size="18"></i> Dashboard</a>
            <a href="profile.html" class="nav-item"><i data-lucide="user" size="18"></i> Profile Settings</a>
            <a href="rewards.html" class="nav-item"><i data-lucide="award" size="18"></i> Rewards Zone</a>
            <a href="shop.html" class="nav-item active"><i data-lucide="shopping-bag" size="18"></i> AgroShop</a>
            <a href="ai-chat.html" class="nav-item"><i data-lucide="message-square" size="18"></i> AgroGenius AI</a>
            <a href="scan.html" class="nav-item"><i data-lucide="scan" size="18"></i> Disease Scan</a>
            <a href="crop-guide.html" class="nav-item"><i data-lucide="sprout" size="18"></i> Crop Guide</a>
            <a href="soil.html" class="nav-item"><i data-lucide="beaker" size="18"></i> Soil Lab</a>
            <a href="weather.html" class="nav-item"><i data-lucide="cloud-rain" size="18"></i> Weather</a>
            <a href="smartpick.html" class="nav-item"><i data-lucide="trending-up" size="18"></i> Smart Pick</a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-full relative w-full">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-30 border-b border-slate-200 px-8 py-4 flex items-center justify-between">
            <h2 class="text-xl font-bold text-slate-800">AgroShop</h2>
            <button onclick="logoutUser()" class="flex items-center gap-2 px-3 py-1.5 bg-red-50 text-red-600 rounded-xl font-bold"><i data-lucide="log-out" size="16"></i> Logout</button>
        </header>

        <main class="flex-1 overflow-y-auto p-8">
            <div class="bg-gradient-to-r from-yellow-500 to-amber-600 rounded-3xl p-8 text-white shadow-xl mb-8 flex justify-between items-center">
                <div><h2 class="text-3xl font-bold mb-2">Marketplace</h2><p class="text-yellow-100">Use points for discounts.</p></div>
                <div class="bg-white/20 backdrop-blur-md px-6 py-3 rounded-2xl"><p class="text-xs uppercase tracking-wider">Balance</p><p class="text-2xl font-bold">120 Pts</p></div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="shop-grid">
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1592878904946-b3cd8ae243d9?auto=format&fit=crop&q=80&w=200&h=200" class="w-full h-40 object-cover">
                    <div class="p-5">
                        <h4 class="font-bold text-slate-900 mb-2">Hybrid Tomato Seeds</h4>
                        <div class="flex justify-between items-center"><span class="text-lg font-bold text-green-700">₹40</span><button onclick="alert('Added to cart')" class="bg-slate-900 text-white p-2 rounded-lg"><i data-lucide="shopping-cart" size="18"></i></button></div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1628352081506-83c43123ed6d?auto=format&fit=crop&q=80&w=200&h=200" class="w-full h-40 object-cover">
                    <div class="p-5">
                        <h4 class="font-bold text-slate-900 mb-2">Organic NPK</h4>
                        <div class="flex justify-between items-center"><span class="text-lg font-bold text-green-700">₹250</span><button onclick="alert('Added to cart')" class="bg-slate-900 text-white p-2 rounded-lg"><i data-lucide="shopping-cart" size="18"></i></button></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "YOUR_PROJECT_ID.firebaseapp.com", projectId: "YOUR_PROJECT_ID", storageBucket: "YOUR_PROJECT_ID.appspot.com", messagingSenderId: "YOUR_ID", appId: "YOUR_APP_ID" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app);
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });
        window.logoutUser = () => signOut(auth);
        lucide.createIcons();
    </script>
</body>
</html>
