<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | AgroPath</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; transition: 0.2s; color: #64748b; font-weight: 500; text-decoration: none; }
        .nav-item:hover { background: #f1f5f9; color: #0f172a; }
        .nav-item.active { background: #f0fdf4; color: #15803d; font-weight: 600; box-shadow: inset 0 0 0 1px rgba(22, 163, 74, 0.1); }
    </style>
</head>
<body class="text-slate-900 h-screen flex overflow-hidden">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-slate-100 flex items-center gap-3">
            <div class="bg-green-600 p-2 rounded-xl"><i data-lucide="leaf" class="w-5 h-5 text-white"></i></div>
            <div><h1 class="text-lg font-bold tracking-tight">AGROPATH</h1></div>
        </div>
        <nav class="p-4 space-y-1.5 flex-1 overflow-y-auto">
            <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard" size="18"></i> Dashboard</a>
            <a href="profile.html" class="nav-item active"><i data-lucide="user" size="18"></i> Profile Settings</a>
            <a href="rewards.html" class="nav-item"><i data-lucide="award" size="18"></i> Rewards Zone</a>
            </nav>
    </aside>

    <div class="flex-1 flex flex-col h-full relative w-full">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-30 border-b border-slate-200 px-8 py-4 flex items-center justify-between">
            <h2 class="text-xl font-bold text-slate-800">Edit Profile</h2>
            <button onclick="logoutUser()" class="flex items-center gap-2 px-3 py-1.5 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 font-bold"><i data-lucide="log-out" size="16"></i> Logout</button>
        </header>

        <main class="flex-1 overflow-y-auto p-8 flex justify-center">
            
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 w-full max-w-2xl overflow-hidden h-fit">
                <div class="bg-green-600 h-32 w-full"></div> <div class="px-8 pb-8">
                    <div class="relative w-32 h-32 mx-auto -mt-16 mb-6">
                        <img id="profile-img-preview" src="https://ui-avatars.com/api/?name=Farmer&background=16a34a&color=fff&size=128" class="w-full h-full rounded-full border-4 border-white object-cover shadow-lg bg-white">
                        <button onclick="alert('To upload images, Firebase Storage must be configured in your console. For now, updating your name updates your avatar automatically!')" class="absolute bottom-0 right-0 p-2.5 bg-slate-900 text-white rounded-full hover:bg-slate-700 transition-colors shadow-md">
                            <i data-lucide="camera" size="16"></i>
                        </button>
                    </div>

                    <form id="profile-form" class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Display Name</label>
                            <input type="text" id="edit-name" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 outline-none focus:ring-2 focus:ring-green-500/20 font-medium" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Email Address (Read Only)</label>
                            <input type="email" id="edit-email" class="w-full bg-slate-100 border border-slate-200 rounded-xl p-3.5 text-slate-500 font-medium cursor-not-allowed" disabled>
                        </div>
                        
                        <div id="save-msg" class="text-green-600 font-bold text-sm hidden text-center">Profile Updated Successfully!</div>
                        
                        <button type="submit" id="save-btn" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition-colors shadow-lg shadow-green-600/20 mt-4">
                            Save Changes
                        </button>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 👉 PASTE FIREBASE KEYS HERE
        const firebaseConfig = {
  apiKey: "AIzaSyDyZ5c3whwanxBvmrPtPIGpjw5t2s2LHXc",
  authDomain: "agropath-6d8ea.firebaseapp.com",
  projectId: "agropath-6d8ea",
  storageBucket: "agropath-6d8ea.firebasestorage.app",
  messagingSenderId: "234293564294",
  appId: "1:234293564294:web:ac33138d93ca565d9dd207",
  measurementId: "G-TRKFSVR8WD"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Load Current User Data
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html"; 
            else {
                document.getElementById('edit-name').value = user.displayName || "";
                document.getElementById('edit-email').value = user.email || "";
                
                if(user.photoURL) document.getElementById('profile-img-preview').src = user.photoURL;
                else document.getElementById('profile-img-preview').src = `https://ui-avatars.com/api/?name=${user.displayName || 'Farmer'}&background=16a34a&color=fff&size=128`;
            }
        });

        // Save Form
        document.getElementById('profile-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newName = document.getElementById('edit-name').value;
            const btn = document.getElementById('save-btn');
            
            btn.innerText = "Saving...";
            btn.disabled = true;

            // Generate a new Avatar URL based on the new name
            const newAvatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(newName)}&background=16a34a&color=fff&size=128`;

            updateProfile(auth.currentUser, {
                displayName: newName,
                photoURL: newAvatarUrl
            }).then(() => {
                document.getElementById('profile-img-preview').src = newAvatarUrl;
                document.getElementById('save-msg').classList.remove('hidden');
                btn.innerText = "Save Changes";
                btn.disabled = false;
                setTimeout(() => document.getElementById('save-msg').classList.add('hidden'), 3000);
            }).catch((error) => {
                alert("Error updating profile: " + error.message);
                btn.innerText = "Save Changes";
                btn.disabled = false;
            });
        });

        window.logoutUser = () => signOut(auth);
        lucide.createIcons();
    </script>
</body>
</html>
