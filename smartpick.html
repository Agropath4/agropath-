<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pick | AgroPath</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; transition: 0.2s; color: #64748b; font-weight: 500; text-decoration: none; }
        .nav-item:hover { background: #f1f5f9; color: #0f172a; }
        .nav-item.active { background: #f0fdf4; color: #15803d; font-weight: 600; box-shadow: inset 0 0 0 1px rgba(22, 163, 74, 0.1); }
    </style>
</head>
<body class="text-slate-900 h-screen flex overflow-hidden">
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-slate-100 flex items-center gap-3">
            <div class="bg-green-600 p-2 rounded-xl"><i data-lucide="leaf" class="w-5 h-5 text-white"></i></div>
            <div><h1 class="text-lg font-bold tracking-tight">AGROPATH</h1></div>
        </div>
        <nav class="p-4 space-y-1.5 flex-1 overflow-y-auto">
            <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard" size="18"></i> Dashboard</a>
            <a href="profile.html" class="nav-item"><i data-lucide="user" size="18"></i> Profile Settings</a>
            <a href="rewards.html" class="nav-item"><i data-lucide="award" size="18"></i> Rewards Zone</a>
            <a href="shop.html" class="nav-item"><i data-lucide="shopping-bag" size="18"></i> AgroShop</a>
            <a href="ai-chat.html" class="nav-item"><i data-lucide="message-square" size="18"></i> AgroGenius AI</a>
            <a href="scan.html" class="nav-item"><i data-lucide="scan" size="18"></i> Disease Scan</a>
            <a href="crop-guide.html" class="nav-item"><i data-lucide="sprout" size="18"></i> Crop Guide</a>
            <a href="soil.html" class="nav-item"><i data-lucide="beaker" size="18"></i> Soil Lab</a>
            <a href="weather.html" class="nav-item"><i data-lucide="cloud-rain" size="18"></i> Weather</a>
            <a href="smartpick.html" class="nav-item active"><i data-lucide="trending-up" size="18"></i> Smart Pick</a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-full relative w-full">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-30 border-b border-slate-200 px-8 py-4 flex items-center justify-between">
            <h2 class="text-xl font-bold text-slate-800">Smart Crop Picker</h2>
            <button onclick="logoutUser()" class="flex items-center gap-2 px-3 py-1.5 bg-red-50 text-red-600 rounded-xl font-bold"><i data-lucide="log-out" size="16"></i> Logout</button>
        </header>

        <main class="flex-1 overflow-y-auto p-8 flex justify-center">
            <div class="w-full max-w-xl bg-white p-10 rounded-3xl shadow-sm border border-slate-200 text-center h-fit">
                <i data-lucide="trending-up" size="48" class="text-blue-600 mx-auto mb-4"></i>
                <h2 class="text-3xl font-bold mb-4">AI Profit Analysis</h2>
                <select class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-6 font-bold">
                    <option>Kharif (Monsoon)</option>
                    <option>Rabi (Winter)</option>
                </select>
                <button onclick="document.getElementById('res').classList.remove('hidden')" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg">Analyze</button>

                <div id="res" class="hidden mt-8 text-left bg-slate-50 p-6 rounded-2xl border border-slate-200">
                    <h3 class="font-bold text-lg text-slate-800 mb-2">Recommendation: Soybean</h3>
                    <p class="text-green-700 font-bold">Est. Profit: $950 / Acre</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      const firebaseConfig = {
  apiKey: "AIzaSyDyZ5c3whwanxBvmrPtPIGpjw5t2s2LHXc",
  authDomain: "agropath-6d8ea.firebaseapp.com",
  projectId: "agropath-6d8ea",
  storageBucket: "agropath-6d8ea.firebasestorage.app",
  messagingSenderId: "234293564294",
  appId: "1:234293564294:web:ac33138d93ca565d9dd207",
  measurementId: "G-TRKFSVR8WD"
};
        const app = initializeApp(firebaseConfig); const auth = getAuth(app);
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });
        window.logoutUser = () => signOut(auth);
        lucide.createIcons();
    </script>
</body>
</html>
